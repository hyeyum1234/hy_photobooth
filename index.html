<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HY_photo_booth</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>📸 HY_photo_Booth</h2>

<div class="title">🎀 프레임 고르기</div>
<div id="frameSelection" class="frame-selection"></div>

<div class="title">🎨 배경 색 고르기</div>
<div id="colorPicker">
  <button data-color="#ffffff" style="background:#ffffff"></button>
  <button data-color="#ffd1dc" style="background:#ffd1dc"></button>
  <button data-color="#ffdac1" style="background:#ffdac1"></button>
  <button data-color="#e2f0cb" style="background:#e2f0cb"></button>
  <button data-color="#c7ceea" style="background:#c7ceea"></button>
  <button data-color="#b5ead7" style="background:#b5ead7"></button>
  <button data-color="#d5f4ff" style="background:#d5f4ff"></button>
  <button data-color="#ff4d6d" style="background:#ff4d6d"></button>
  <button data-color="#ff9f1c" style="background:#ff9f1c"></button>
  <button data-color="#ffea00" style="background:#ffea00"></button>
  <button data-color="#2ec4b6" style="background:#2ec4b6"></button>
  <button data-color="#4361ee" style="background:#4361ee"></button>
  <button data-color="#7209b7" style="background:#7209b7"></button>
</div>

<div class="title">✨ 스티커 드래그해서 붙이기 (클릭하면 삭제!)</div>
<div id="stickerSelection" class="sticker-selection"></div>

<div class="title">✏️ 문구 & 날짜</div>
<input id="text1" placeholder="첫 번째 줄 💕" autocomplete="off">
<input id="text2" placeholder="두 번째 줄 💕" autocomplete="off">
<input id="dateInput" placeholder="날짜" autocomplete="off">

<div class="top-controls">
  <button id="saveBtn" class="btn-save">💾 저장</button>
  <button id="undoBtn" class="btn-undo">↩️ 한 장 취소</button>
  <button id="clearPhotosBtn" class="btn-clear-photos">🖼️ 사진만 싹 비우기</button>
  <button id="resetAllBtn" class="btn-reset-all">🧹 전체 초기화</button>
</div>

<div id="cameraControls" style="display:none; margin:15px auto; text-align:center;">
  <button id="flipBtn">🔄 카메라 전환</button>
</div>

<div id="canvasWrapper">
  <canvas id="resultCanvas"></canvas>
  <button id="floatingStartBtn" title="카메라 시작">🎥</button>
  <button id="floatingCaptureBtn" title="촬영하기">📸</button>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script src="script.js"></script>
</body>
</html>
